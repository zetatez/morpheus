name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

  build:
    name: Build
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -coverprofile=coverage.out ./...

      - name: Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  cli-build:
    name: Build CLI
    runs-on: arch-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        run: go build -o morpheus ./cmd/morpheus

      - name: Verify binary
        run: |
          if [ ! -f morpheus ]; then
            echo "Binary not created"
            exit 1
          fi
          echo "Binary created successfully"
          ls -la morpheus

  cross-platform:
    name: Cross-platform Build
    runs-on: arch-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          go build -o morpheus-${GOOS}-${GOARCH}${ext} ./cmd/morpheus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: morpheus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: morpheus-${{ matrix.goos }}-${{ matrix.goarch }}*
